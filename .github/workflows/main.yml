name: Deploy Static Web to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # เปลี่ยนมาใช้ตัวมาตรฐานเพื่อให้ระบบดึงโค้ดได้สำเร็จ 100%
      - name: Checkout Code
        uses: actions/checkout@v4

      # ทำการ Deploy ไปยัง GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
